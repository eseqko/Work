<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Handbook</title>
<link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#0F2044;--brand-mid:#1B3468;--brand-lt:#E2E8F3;
  --accent:#C8A64A;--accent-dk:#9A7B2E;--accent-lt:#F5EDD0;
  --gold-shine:linear-gradient(135deg,#D4B04A 0%,#E8D48B 45%,#C8A64A 75%,#A68A3A 100%);
  --bg:#FAF7F0;--surface:#FFFEF8;--text:#0F1B2D;--muted:#5C6B82;
  --border:#D4C9A8;--border-gold:#C8A64A33;
  --r:10px;--sw:230px;
  --font-d:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-b:'Cal Sans','DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-ui:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --sh-card:0 1px 3px rgba(15,32,68,.06),0 4px 14px rgba(15,32,68,.04);
  --sh-lift:0 2px 6px rgba(15,32,68,.1),0 10px 28px rgba(15,32,68,.07);
  --sh-inset:inset 0 2px 4px rgba(15,32,68,.05);
  --sh-gold:0 0 0 1px var(--accent),0 0 0 3px var(--surface),0 0 0 4px var(--border)
}
@font-face{font-family:'Cal Sans';font-synthesis:none}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:16px;line-height:1.65;font-synthesis:none}
strong,b{font-family:var(--font-d);font-weight:700}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.hdr{background:linear-gradient(180deg,var(--brand) 0%,#0A1830 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:100;
  box-shadow:0 3px 12px rgba(15,32,68,.25),inset 0 -1px 0 var(--accent);
  border-bottom:2.5px solid var(--accent)}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{height:36px;width:auto;max-width:80px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,.92);padding:3px;border-radius:5px}
.hdr-title{font-family:var(--font-d);font-size:1.1rem;font-weight:700;line-height:1.2;letter-spacing:.3px}
.hdr-tag{font-size:.7rem;opacity:.65;font-weight:400;font-style:italic;font-family:var(--font-b)}
.hdr-links{display:flex;gap:8px;flex-shrink:0}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(200,166,74,.35);color:rgba(255,255,255,.8);border-radius:6px;padding:5px 12px;font-family:var(--font-ui);font-size:.72rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap}
.hdr-btn:hover{background:rgba(200,166,74,.15);color:#fff;border-color:var(--accent)}

.wrap{display:flex;min-height:calc(100vh - 58px)}

.side{width:var(--sw);background:var(--surface);border-right:1.5px solid var(--border);padding:14px 0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0;
  box-shadow:inset -6px 0 12px -6px rgba(15,32,68,.04);
  background-image:linear-gradient(180deg,#FFFDF5 0%,#F8F4E8 100%)}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-family:var(--font-ui);font-size:.8rem;font-weight:500;color:var(--muted);border-left:3.5px solid transparent;transition:all .2s;user-select:none;position:relative}
.ni:hover{background:var(--brand-lt);color:var(--brand)}
.ni.on{background:linear-gradient(90deg,var(--brand-lt),transparent);color:var(--brand);border-left-color:var(--accent);font-weight:700;font-family:var(--font-d)}
.ni.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:3px 0 0 3px;opacity:.4}
.ni-icon{font-size:1rem;flex-shrink:0}

.main{flex:1;padding:30px 32px 60px;max-width:780px;min-width:0}

.handbook-section{margin-bottom:40px;scroll-margin-top:70px}
.handbook-section:last-child{margin-bottom:20px}
.sec-title{font-family:var(--font-d);font-size:1.4rem;font-weight:700;color:var(--brand);margin-bottom:2px;letter-spacing:.1px}
.sec-title::after{content:'';display:block;width:48px;height:3px;background:var(--gold-shine);border-radius:2px;margin-top:6px}
.sec-icon{margin-right:8px}

.handbook-content{font-size:.88rem;line-height:1.75;margin-top:14px}
.handbook-content p{margin-bottom:10px}
.handbook-content p:last-child{margin-bottom:0}
.handbook-content ul,.handbook-content ol{padding-left:1.3em;margin:6px 0 10px}
.handbook-content li{margin:4px 0}
.handbook-content li::marker{color:var(--accent)}
.handbook-content strong{font-weight:700;color:var(--brand)}
.handbook-content a{color:var(--brand-mid);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:2px;transition:color .15s}
.handbook-content a:hover{color:var(--accent-dk)}
.handbook-content table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem;margin:10px 0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--sh-inset)}
.handbook-content th{background:var(--brand);color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-family:var(--font-d);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--accent)}
.handbook-content td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.handbook-content td:last-child,.handbook-content th:last-child{text-align:center}
.handbook-content tr:last-child td{border-bottom:none}
.handbook-content tr:nth-child(even) td{background:rgba(200,166,74,.04)}
.handbook-content tr:hover td{background:rgba(200,166,74,.08)}
.handbook-content h3,.handbook-content h4{font-family:var(--font-d);color:var(--brand);margin:16px 0 6px}
.handbook-content h3{font-size:1rem;font-weight:700}
.handbook-content h4{font-size:.9rem;font-weight:600}

.sub-title{font-family:var(--font-d);font-size:1.05rem;font-weight:700;color:var(--brand-mid);margin:20px 0 4px;padding-top:16px;border-top:1px solid var(--border)}
.sub-title:first-of-type{margin-top:12px;padding-top:0;border-top:none}

.callout{background:linear-gradient(135deg,var(--accent-lt),#FFF8E1);border-left:4px solid var(--accent);padding:11px 14px;border-radius:0 var(--r) var(--r) 0;margin:14px 0;font-size:.83rem;color:#5A4506;
  box-shadow:var(--sh-card);position:relative}
.callout::before{content:'';position:absolute;left:-4px;top:0;bottom:0;width:4px;background:var(--gold-shine);border-radius:4px 0 0 4px}

.gold-rule{border:none;height:1.5px;background:var(--gold-shine);margin:16px 0;opacity:.5}

.sec-divider{display:none}
.sec-hero{display:flex;align-items:center;gap:18px;margin-bottom:8px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-hero-disc{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent-lt),#FFF8E1);border:1.5px solid var(--border-gold);display:flex;align-items:center;justify-content:center;font-size:1.95rem;flex-shrink:0;box-shadow:inset 0 1px 3px rgba(15,32,68,.05),0 1px 4px rgba(15,32,68,.06)}
.sec-hero-meta{flex:1;min-width:0}
.sec-hero-num{font-family:var(--font-d);font-size:.7rem;font-weight:700;color:var(--accent-dk);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:3px}
.sec-hero-title{font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--brand);letter-spacing:.1px;line-height:1.2}
.sec-hero-title::after{content:'';display:block;width:64px;height:3px;background:var(--gold-shine);border-radius:2px;margin-top:7px}
.sec-tag{font-family:var(--font-b);font-size:.88rem;color:var(--muted);font-style:italic;margin-top:10px;line-height:1.5}

.bell-schedule{margin:14px 0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh-card);background:#fff}
.bell-row{display:grid;grid-template-columns:1fr 1.1fr 100px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.bell-row:last-child{border-bottom:none}
.bell-row:nth-child(even){background:rgba(200,166,74,.04)}
.bell-row:hover{background:rgba(200,166,74,.08)}
.bell-period{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--brand)}
.bell-time{font-family:var(--font-d);font-size:.95rem;color:var(--brand-mid);font-variant-numeric:tabular-nums;letter-spacing:.3px;text-align:center}
.bell-room{font-family:var(--font-d);font-size:.78rem;color:var(--muted);text-align:right;text-transform:uppercase;letter-spacing:.7px}
.bell-note{grid-column:1/-1;font-size:.78rem;color:var(--muted);font-style:italic;margin-top:4px;padding-top:6px;border-top:1px dashed var(--border)}

.h-pyramid{margin:18px auto;display:flex;flex-direction:column;align-items:center;gap:5px;max-width:540px}
.h-tier{padding:13px 20px;border-radius:6px;font-family:var(--font-d);font-size:.88rem;line-height:1.5;box-shadow:var(--sh-card)}
.h-tier-label{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:1.6px;display:block;margin-bottom:3px;opacity:.88}
.h-tier-3{width:56%;background:var(--brand);color:#fff;border:1.5px solid var(--brand-mid)}
.h-tier-2{width:78%;background:linear-gradient(135deg,#E8D48B,#D4B04A);color:var(--brand);border:1.5px solid #A68A3A}
.h-tier-1{width:100%;background:linear-gradient(135deg,var(--accent-lt),#FFF8E1);color:var(--brand);border:1.5px solid var(--border-gold);border-left:5px solid var(--accent)}

.h-steps{list-style:none;counter-reset:hstep;padding-left:0;margin:16px 0}
.h-steps li{position:relative;padding:6px 0 16px 56px;counter-increment:hstep;min-height:48px}
.h-steps li::before{content:counter(hstep);position:absolute;left:0;top:4px;width:40px;height:40px;border-radius:50%;background:var(--gold-shine);color:var(--brand);font-family:var(--font-d);font-size:1.08rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(15,32,68,.18),inset 0 1px 2px rgba(255,255,255,.45)}
.h-steps li:not(:last-child)::after{content:'';position:absolute;left:19.5px;top:48px;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent),var(--border-gold))}
.h-step-title{font-family:var(--font-d);font-weight:700;color:var(--brand);font-size:.96rem;margin-bottom:2px;display:block}
.h-step-body{font-family:var(--font-b);font-size:.86rem;color:var(--text);line-height:1.55}

.h-cta{margin:18px 0;padding:16px 18px;background:linear-gradient(135deg,var(--accent-lt),#FFFCEA);border-left:5px solid var(--accent);border-radius:0 var(--r) var(--r) 0;box-shadow:var(--sh-card)}
.h-cta-title{font-family:var(--font-d);font-weight:700;color:var(--brand);font-size:1rem;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.h-cta-body{font-family:var(--font-b);font-size:.87rem;color:var(--text);line-height:1.55}
.h-cta-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.h-cta-btn{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#fff;text-decoration:none;font-family:var(--font-d);font-size:.78rem;font-weight:600;padding:7px 14px;border-radius:20px;border:1.5px solid var(--brand-mid);transition:all .15s;letter-spacing:.2px}
.h-cta-btn:hover{background:var(--brand-mid);transform:translateY(-1px);box-shadow:var(--sh-card)}
.h-cta-btn.outline{background:transparent;color:var(--brand);border-color:var(--accent)}
.h-cta-btn.outline:hover{background:var(--accent-lt)}

.foot{background:var(--brand);border-top:2.5px solid var(--accent);padding:13px 20px;font-size:.8rem;color:rgba(255,255,255,.75);text-align:center;font-family:var(--font-b);font-style:italic;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.15)}

.tabs{display:none;overflow-x:auto;background:linear-gradient(180deg,var(--surface),#F8F4E8);border-bottom:2px solid var(--accent);position:sticky;top:58px;z-index:90;scrollbar-width:none;padding:0 6px;
  box-shadow:0 2px 8px rgba(15,32,68,.06)}
.tabs::-webkit-scrollbar{display:none}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;font-family:var(--font-ui);font-size:.64rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;flex-shrink:0;transition:all .15s}
.ti.on{color:var(--brand);border-bottom-color:var(--accent);font-weight:700;font-family:var(--font-d)}
.ti-icon{font-size:.9rem}

@media(max-width:640px){
  .side{display:none}
  .tabs{display:flex}
  .wrap{flex-direction:column}
  .main{padding:16px 14px 40px}
  .sec-title{font-size:1.2rem}
  .hdr-links{display:none}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.main>*{animation:fadeIn .22s ease}

.embed-mode .hdr,.embed-mode .foot{display:none}
.embed-mode .wrap{min-height:100vh}
.embed-mode .side{top:0;height:100vh}
.embed-mode .tabs{top:0}

.cover-page,.toc-page{display:none}

@page{size:letter;margin:0.75in 0.75in 1in 0.75in;@bottom-center{content:counter(page);font-family:'DM Sans',sans-serif;font-size:9pt;color:#5C6B82}}
@page:first{@bottom-center{content:none}}

@media print{
  .hdr,.side,.tabs,.foot{display:none!important}
  body::before{display:none!important}
  body{background:#fff;color:#000}
  .wrap{display:block;min-height:auto}
  .main{max-width:100%;padding:0;animation:none}
  .main>*{animation:none}

  .cover-page{display:block!important;position:relative;z-index:1;min-height:9in;background:#fff;text-align:center;padding:0.7in 0 0;page-break-after:always;break-after:page;overflow:hidden}
  .cover-inner{position:relative;z-index:2;max-width:5.5in;margin:0 auto;display:flex;flex-direction:column;min-height:8in}
  .cover-top{text-align:center}
  .cover-mid{text-align:center;margin-top:3in}
  .cover-bottom{text-align:center;margin-top:auto}
  .cover-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5.8in;max-width:5.8in;opacity:.22;z-index:1;pointer-events:none;filter:saturate(1.4) contrast(1.1);-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cover-school{font-family:'DM Sans',sans-serif;font-size:24pt;font-weight:700;color:#0F2044;letter-spacing:.3pt;margin-bottom:6pt}
  .cover-rule{width:2.8in;height:4pt;background:#C8A64A;margin:18pt auto 0;border-radius:2pt}
  .cover-title{font-family:'DM Sans',sans-serif;font-size:38pt;font-weight:700;color:#0F2044;margin-bottom:14pt;line-height:1.1}
  .cover-tag{font-family:'Cal Sans',sans-serif;font-size:13pt;color:#5C6B82;font-style:italic;line-height:1.4}
  .cover-year{font-family:'DM Sans',sans-serif;font-size:14pt;font-weight:600;color:#1B3468;letter-spacing:.5pt;text-transform:uppercase}
  .cover-contact{margin-top:0.2in;font-family:'DM Sans',sans-serif;font-size:10.5pt;color:#5C6B82;line-height:1.7}
  .cover-contact .cc-line{margin:2pt 0}
  .cover-contact .cc-rule{width:.8in;height:1pt;background:#C8A64A;margin:8pt auto 14pt;opacity:.5}

  .toc-page{display:block!important;page-break-after:always;break-after:page}
  .toc-title{font-family:'DM Sans',sans-serif;font-size:22pt;font-weight:700;color:#0F2044;border-bottom:3pt solid #C8A64A;padding-bottom:8pt;margin-bottom:18pt}
  .toc-list{font-family:'DM Sans',sans-serif;font-size:11.5pt;line-height:1.7;color:#1A1A1A}
  .toc-item{display:flex;align-items:baseline;gap:6pt;padding:3pt 0;border-bottom:none}
  .toc-icon{flex-shrink:0;font-size:11pt}
  .toc-text{flex:1;overflow:hidden}
  .toc-label{float:left}
  .toc-dots{overflow:hidden;white-space:nowrap;color:#999;margin:0 4pt}
  .toc-dots::before{content:'....................................................................................................................';letter-spacing:2pt}
  .toc-pg{flex-shrink:0;font-variant-numeric:tabular-nums;min-width:18pt;text-align:right;font-weight:600;color:#0F2044}

  .handbook-section{page-break-before:always;break-before:page;page-break-inside:auto;break-inside:auto;margin-bottom:0;padding-top:0;scroll-margin-top:0}
  .handbook-section:first-child{page-break-before:auto;break-before:auto}
  .sec-title{font-family:'DM Sans',sans-serif;font-size:20pt;color:#0F2044;page-break-after:avoid;break-after:avoid;margin-bottom:4pt}
  .sec-title::after{width:1.5in;height:3pt;background:#C8A64A;margin-top:5pt}
  .handbook-content{font-size:11pt;line-height:1.55;margin-top:10pt;color:#1A1A1A}
  .handbook-content h3{font-size:13pt;color:#0F2044;margin-top:14pt;page-break-after:avoid;break-after:avoid}
  .handbook-content h4{font-size:11.5pt;color:#1B3468;page-break-after:avoid;break-after:avoid}
  .handbook-content p{font-size:11pt;margin-bottom:8pt}
  .handbook-content ul,.handbook-content ol{margin:4pt 0 10pt 0;padding-left:1.2em}
  .handbook-content li{font-size:11pt;margin:2pt 0}
  .handbook-content a{color:#1B3468;text-decoration:underline}
  .handbook-content table{font-size:10pt;page-break-inside:avoid;break-inside:avoid;border:1pt solid #888;box-shadow:none;margin:6pt 0 10pt}
  .handbook-content th{background:#0F2044!important;color:#fff!important;font-size:9pt;padding:5pt 8pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .handbook-content td{font-size:10pt;padding:4pt 8pt;border-bottom:.5pt solid #ccc}
  .handbook-content tr:nth-child(even) td{background:transparent}
  .sub-title{font-size:13pt;page-break-after:avoid;break-after:avoid;color:#0F2044;margin-top:14pt}
  .callout{page-break-inside:avoid;break-inside:avoid;background:#FAF6E8!important;border-left:3pt solid #C8A64A;padding:8pt 12pt;font-size:10pt;-webkit-print-color-adjust:exact;print-color-adjust:exact;box-shadow:none}

  .sec-divider{display:block!important;page-break-after:always;break-after:page;text-align:center;padding:2.6in 0 0;min-height:9in;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sec-divider-num{font-family:'DM Sans',sans-serif;font-size:11pt;font-weight:700;color:#9A7B2E;letter-spacing:2.2pt;text-transform:uppercase;margin-bottom:18pt}
  .sec-divider-icon{font-size:54pt;margin:0 auto 14pt;line-height:1;display:block}
  .sec-divider-title{font-family:'DM Sans',sans-serif;font-size:30pt;font-weight:700;color:#0F2044;letter-spacing:.4pt;margin:0 auto 18pt;line-height:1.18;max-width:5.5in;padding:0 0.4in}
  .sec-divider-rule{width:2.8in;height:3pt;background:#C8A64A;margin:0 auto 22pt;border-radius:2pt}
  .sec-divider-tag{font-family:'Cal Sans',sans-serif;font-size:13pt;color:#5C6B82;font-style:italic;line-height:1.5;max-width:4.5in;margin:0 auto;padding:0 0.4in}
  .sec-hero,.sec-tag{display:none!important}

  .bell-schedule{border:1pt solid #888;border-radius:5pt;margin:10pt 0;page-break-inside:avoid;break-inside:avoid;overflow:hidden}
  .bell-row{display:grid;grid-template-columns:1fr 1.1fr 1in;align-items:center;padding:7pt 12pt;border-bottom:.5pt solid #ccc;page-break-inside:avoid;background:#fff}
  .bell-row:last-child{border-bottom:none}
  .bell-row:nth-child(even){background:#FAF6E8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .bell-period{font-size:11pt;font-weight:700;color:#0F2044}
  .bell-time{font-size:10.5pt;color:#1B3468;text-align:center;font-variant-numeric:tabular-nums}
  .bell-room{font-size:9pt;color:#5C6B82;text-align:right;text-transform:uppercase;letter-spacing:.5pt}
  .bell-note{grid-column:1/-1;font-size:9pt;color:#5C6B82;font-style:italic;margin-top:3pt;padding-top:4pt;border-top:.3pt dashed #ccc}

  .h-pyramid{max-width:5in;margin:12pt auto;display:flex;flex-direction:column;align-items:center;gap:3pt;page-break-inside:avoid;break-inside:avoid}
  .h-tier{padding:8pt 14pt;border-radius:4pt;font-size:10pt;line-height:1.45;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .h-tier-3{width:56%;background:#0F2044!important;color:#fff!important}
  .h-tier-2{width:78%;background:#E8D48B!important;color:#0F2044!important}
  .h-tier-1{width:100%;background:#FAF6E8!important;color:#0F2044!important;border-left:3pt solid #C8A64A}
  .h-tier-label{font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:1.4pt;display:block;margin-bottom:2pt;opacity:.88}

  .h-steps{list-style:none;padding-left:0;counter-reset:hstep;margin:10pt 0}
  .h-steps li{position:relative;padding:5pt 0 12pt 0.55in;counter-increment:hstep;page-break-inside:avoid;break-inside:avoid}
  .h-steps li::before{content:counter(hstep);position:absolute;left:0;top:3pt;width:30pt;height:30pt;border-radius:50%;background:#C8A64A!important;color:#0F2044!important;font-size:13pt;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .h-steps li:not(:last-child)::after{content:'';position:absolute;left:15pt;top:36pt;bottom:2pt;width:1.5pt;background:#C8A64A;opacity:.4}
  .h-step-title{font-size:11pt;font-weight:700;color:#0F2044;margin-bottom:1pt;display:block}
  .h-step-body{font-size:10pt;color:#1A1A1A;line-height:1.5}

  .h-cta{margin:10pt 0;padding:9pt 12pt;background:#FAF6E8!important;border-left:3pt solid #C8A64A;page-break-inside:avoid;break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-radius:0 4pt 4pt 0}
  .h-cta-title{font-size:11pt;font-weight:700;color:#0F2044;margin-bottom:4pt}
  .h-cta-body{font-size:10pt;line-height:1.5;color:#1A1A1A}
  .h-cta-actions{margin-top:5pt}
  .h-cta-btn{display:inline-block;padding:3pt 10pt;background:#0F2044!important;color:#fff!important;font-size:9pt;font-weight:600;border-radius:11pt;text-decoration:none;margin:3pt 4pt 0 0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .h-cta-btn.outline{background:#fff!important;color:#0F2044!important;border:.8pt solid #C8A64A}
}
</style>
</head>
<body>
<script src="school-config.js"></script>
<script src="school-data.js"></script>

<div class="cover-page" aria-hidden="true">
  <img data-school-logo class="cover-watermark" alt="" style="display:none">
  <div class="cover-inner">
    <div class="cover-top">
      <div class="cover-school" id="cover-school">Your School</div>
      <div class="cover-rule"></div>
    </div>
    <div class="cover-mid">
      <div class="cover-title">Student Handbook</div>
      <div class="cover-tag">Your guide to policies, resources, and expectations.</div>
    </div>
    <div class="cover-bottom">
      <div class="cover-year" id="cover-year"></div>
      <div class="cover-contact" id="cover-contact"></div>
    </div>
  </div>
</div>
<div class="toc-page" aria-hidden="true">
  <div class="toc-title">Table of Contents</div>
  <div class="toc-list" id="toc-list"></div>
</div>

<div id="hdr"></div>
<div class="tabs" id="tabs"></div>
<div class="wrap">
  <nav class="side" id="side"></nav>
  <main class="main" id="main"></main>
</div>
<div id="foot"></div>

<script>
(function(){
  if(window.SchoolConfig){
    SchoolConfig.init();
    const cfg=SchoolConfig.load();
    if(cfg.colors&&cfg.colors.primary){
      document.documentElement.style.setProperty('--brand',cfg.colors.primary);
      document.documentElement.style.setProperty('--brand-mid',SchoolConfig.colorUtils.darken(cfg.colors.primary,8));
    }
    if(cfg.colors&&cfg.colors.secondary){
      document.documentElement.style.setProperty('--accent',cfg.colors.secondary);
    }
    if(cfg.setupComplete){
      document.title=(cfg.shortName||cfg.schoolName)+' Student Handbook';
    }
  }
})();

if(new URLSearchParams(window.location.search).get('embed')==='1'){
  document.body.classList.add('embed-mode');
}

function getSD(){
  const base=(typeof SCHOOL_DATA!=='undefined')?Object.assign({},SCHOOL_DATA):{};
  try{
    const raw=localStorage.getItem('grizznet_draft');
    if(raw){const d=JSON.parse(raw);if(d&&typeof d==='object'){
      for(const k in d){if(!isBlank(d[k]))base[k]=d[k];}
    }}
  }catch(e){}
  return base;
}

function isBlank(v){
  if(v==null) return true;
  if(typeof v==='string') return !v.trim();
  if(Array.isArray(v)) return !v.length||v.every(r=>Array.isArray(r)?r.every(c=>!c||!String(c).trim()):!r||!String(r).trim());
  return false;
}

function sdVal(key,fallback){
  const sd=getSD();
  if(!isBlank(sd[key])) return sd[key];
  return fallback;
}

function renderSD(v){
  const s=String(v||'');
  if(!s) return '';
  if(/<[a-zA-Z][^>]*>/.test(s)) return s;
  const esc=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<p>'+esc.replace(/\n/g,'<br>')+'</p>';
}

const SECTIONS=[
  {id:'contacts',icon:'📞',title:'Contact Information & Communication',short:'Contacts',
   tagline:'How to reach the people and offices that support your student.',
   key:'handbookContacts'},
  {id:'bell-schedule',icon:'🔔',title:'Bell Schedule',short:'Schedule',
   tagline:'Period times, passing, and the rhythm of the school day.',
   key:'handbookBellSchedule'},
  {id:'attendance',icon:'📋',title:'Attendance Policies & Procedures',short:'Attendance',
   tagline:'Why attendance matters, how to excuse absences, and what happens when we worry.',
   key:'handbookAttendance'},
  {id:'counseling',icon:'🤝',title:'School Counseling Services',short:'Counseling',
   tagline:'Academic, college, and social-emotional support — who does what and how to connect.',
   key:'handbookCounseling'},
  {id:'schedule-change',icon:'🔄',title:'Schedule Changes',short:'Sched. Changes',
   tagline:'When and how class schedules can be adjusted after the year begins.',
   key:'handbookScheduleChange'},
  {id:'homework',icon:'📝',title:'Homework & Makeup Procedures',short:'Homework',
   tagline:'Expectations for daily work and how to recover after an absence.',
   key:'handbookHomework'},
  {id:'grading',icon:'📊',title:'Grading & Grade Appeals',short:'Grading',
   tagline:'How grades are determined and the steps to ask for a review.',
   key:'handbookGrading'},
  {id:'academic-integrity',icon:'🎓',title:'Academic Integrity',short:'Integrity',
   tagline:'Honest work, original thinking, and how we treat artificial intelligence tools.',
   keys:[
     {key:'handbookAcademicHonesty',subtitle:'Academic Honesty Policy'},
     {key:'handbookAIPolicy',subtitle:'AI / Technology Use in Academics'}
   ]},
  {id:'activities',icon:'🎉',title:'Student Activities',short:'Activities',
   tagline:'Clubs, leadership, dances, and ways to belong beyond the classroom.',
   key:'handbookActivities'},
  {id:'athletics',icon:'🏆',title:'Athletics',short:'Athletics',
   tagline:'Eligibility, seasons, and what it takes to compete as a Grizzly.',
   key:'handbookAthletics'},
  {id:'health',icon:'🏥',title:'Health & Wellness',short:'Health',
   tagline:'Medication, illness, mental health, and the people you can turn to.',
   key:'handbookHealth'},
  {id:'technology',icon:'💻',title:'Technology & Internet Use Policy',short:'Tech Policy',
   tagline:'Devices, network use, and digital citizenship at school.',
   key:'handbookCellPhone'},
  {id:'general-rules',icon:'📏',title:'General Rules & Regulations',short:'Rules',
   tagline:'The shared expectations that keep our campus respectful and safe.',
   keys:[
     {key:'handbookGeneralRules',subtitle:'General Rules'},
     {key:'handbookDressCode',subtitle:'Dress Code'},
     {key:'handbookCampusAccess',subtitle:'Campus Access Rules'}
   ]},
  {id:'transportation',icon:'🚗',title:'Transportation & Parking',short:'Transport',
   tagline:'Getting to and from school — buses, drop-off, bikes, and parking.',
   key:'handbookTransportation'},
  {id:'district-policies',icon:'⚖️',title:'District Policies',short:'District',
   tagline:'JUHSD policies on discipline, nondiscrimination, bullying, and harassment.',
   keys:[
     {key:'handbookDiscipline',subtitle:'Discipline Procedures'},
     {key:'handbookDistrictPolicies',subtitle:'Nondiscrimination, Bullying & Harassment'}
   ]},
  {id:'parents-community',icon:'👨‍👩‍👧',title:'Parents & Community',short:'Parents',
   tagline:'Ways for families to engage, volunteer, and stay in the loop.',
   key:'handbookParentsCommunity'},
  {id:'community-resources',icon:'🤝',title:'Community Resources',short:'Resources',
   tagline:'County and regional partners ready to help when you need more than school can offer.',
   key:'supportCommunity'}
];

let activeSec=SECTIONS[0].id;

function getSchoolName(){
  if(window.SchoolConfig){
    const cfg=SchoolConfig.load();
    if(cfg.setupComplete) return cfg.schoolName||cfg.shortName||'Your School';
  }
  return 'Your School';
}

function renderHdr(){
  const name=getSchoolName();
  document.getElementById('hdr').innerHTML=`
  <div class="hdr">
    <div class="hdr-left">
      <img data-school-logo class="hdr-logo" alt="" style="display:none">
      <div><div class="hdr-title">${name} Student Handbook</div>
      <div class="hdr-tag">Your guide to policies, resources, and expectations.</div></div>
    </div>
    <div class="hdr-links">
      <a class="hdr-btn" href="hub.html">← Student Hub</a>
      <button class="hdr-btn" onclick="window.print()" title="Print or Save as PDF">📄 Save as PDF</button>
    </div>
  </div>`;
  if(window.SchoolConfig) SchoolConfig.applyIdentity();
}

function renderSide(){
  document.getElementById('side').innerHTML=SECTIONS.map(s=>
    `<div class="ni${activeSec===s.id?' on':''}" data-sec="${s.id}" onclick="scrollToSec('${s.id}')">
      <span class="ni-icon">${s.icon}</span><span>${s.title}</span>
    </div>`
  ).join('');
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=SECTIONS.map(s=>
    `<div class="ti${activeSec===s.id?' on':''}" data-sec="${s.id}" onclick="scrollToSec('${s.id}')">
      <span class="ti-icon">${s.icon}</span><span>${s.short}</span>
    </div>`
  ).join('');
}

function renderBellSchedule(){
  const sd=getSD();
  const rows=Array.isArray(sd.handbookBellScheduleData)?sd.handbookBellScheduleData:[];
  const clean=rows.filter(r=>r&&(r.period||r.time||r.room));
  if(!clean.length) return '';
  return '<div class="bell-schedule">'+clean.map(r=>{
    const e=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    let html='<div class="bell-row">';
    html+='<div class="bell-period">'+e(r.period)+'</div>';
    html+='<div class="bell-time">'+e(r.time)+'</div>';
    html+='<div class="bell-room">'+e(r.room)+'</div>';
    if(r.note) html+='<div class="bell-note">'+e(r.note)+'</div>';
    html+='</div>';
    return html;
  }).join('')+'</div>';
}

function renderContent(sec){
  if(sec.key==='handbookBellSchedule'){
    const sched=renderBellSchedule();
    const val=sdVal(sec.key,'');
    if(sched||val){
      let html='';
      if(sched) html+=sched;
      if(val) html+='<div class="handbook-content">'+renderSD(val)+'</div>';
      return html;
    }
    return '<div class="callout">📌 <strong>Coming soon.</strong> This section is being updated — please check back later.</div>';
  }
  const val=sdVal(sec.key,'');
  if(val) return '<div class="handbook-content">'+renderSD(val)+'</div>';
  return '<div class="callout">📌 <strong>Coming soon.</strong> This section is being updated — please check back later.</div>';
}

function renderComposite(sec){
  let html='';
  sec.keys.forEach(sub=>{
    const val=sdVal(sub.key,'');
    html+='<h3 class="sub-title">'+sub.subtitle+'</h3>';
    if(val) html+='<div class="handbook-content">'+renderSD(val)+'</div>';
    else html+='<div class="callout">📌 <strong>Coming soon.</strong> This section is being updated — please check back later.</div>';
  });
  return html;
}

function renderMain(){
  let html='';
  SECTIONS.forEach((sec,i)=>{
    const num=String(i+1).padStart(2,'0');
    html+='<section id="sec-'+sec.id+'" class="handbook-section">';
    html+='<div class="sec-divider" aria-hidden="true">';
    html+='<div class="sec-divider-num">Section '+num+'</div>';
    html+='<div class="sec-divider-icon">'+sec.icon+'</div>';
    html+='<div class="sec-divider-title">'+sec.title+'</div>';
    html+='<div class="sec-divider-rule"></div>';
    if(sec.tagline) html+='<div class="sec-divider-tag">'+sec.tagline+'</div>';
    html+='</div>';
    html+='<div class="sec-hero">';
    html+='<div class="sec-hero-disc">'+sec.icon+'</div>';
    html+='<div class="sec-hero-meta">';
    html+='<div class="sec-hero-num">Section '+num+'</div>';
    html+='<h2 class="sec-hero-title">'+sec.title+'</h2>';
    html+='</div></div>';
    if(sec.tagline) html+='<div class="sec-tag">'+sec.tagline+'</div>';
    if(sec.keys){
      html+=renderComposite(sec);
    }else{
      html+=renderContent(sec);
    }
    html+='</section>';
  });
  document.getElementById('main').innerHTML=html;
}

function renderFoot(){
  const name=getSchoolName();
  document.getElementById('foot').innerHTML=`<div class="foot">${name} — Student Handbook</div>`;
}

function getSchoolYear(){
  if(window.SchoolConfig){
    const cfg=SchoolConfig.load();
    if(cfg.year) return cfg.year;
  }
  const now=new Date();
  const y=now.getMonth()>=5?now.getFullYear():now.getFullYear()-1;
  return y+'–'+(y+1)+' School Year';
}

function renderCover(){
  document.getElementById('cover-school').textContent=getSchoolName();
  document.getElementById('cover-year').textContent=getSchoolYear();
  const cfg=(window.SchoolConfig?SchoolConfig.load():{});
  const lines=[];
  if(cfg.address) lines.push(`<div class="cc-line">${cfg.address}</div>`);
  const pwParts=[];
  if(cfg.phone) pwParts.push(cfg.phone);
  if(cfg.website) pwParts.push(cfg.website);
  if(pwParts.length) lines.push(`<div class="cc-line">${pwParts.join(' &nbsp;·&nbsp; ')}</div>`);
  const el=document.getElementById('cover-contact');
  if(el){
    if(lines.length) el.innerHTML='<div class="cc-rule"></div>'+lines.join('');
    else el.innerHTML='';
  }
}

function renderToc(){
  document.getElementById('toc-list').innerHTML=SECTIONS.map(s=>
    `<div class="toc-item"><span class="toc-icon">${s.icon}</span><span class="toc-text"><span class="toc-label">${s.title}</span><span class="toc-dots"></span></span><span class="toc-pg" data-toc-sec="${s.id}"></span></div>`
  ).join('');
}

function calcTocPages(){
  const printW=672;
  const printPageH=888;
  const m=document.createElement('div');
  m.className='m-print';
  m.style.cssText='position:absolute;left:-9999px;top:0;width:'+printW+'px;font-family:"DM Sans",sans-serif;color:#000;visibility:hidden';
  const st=document.createElement('style');
  st.textContent=`.m-print *{box-sizing:border-box}
.m-print .toc-title{font-family:'DM Sans',sans-serif;font-size:22pt;font-weight:700;color:#0F2044;border-bottom:3pt solid #C8A64A;padding-bottom:8pt;margin-bottom:18pt;line-height:1.2}
.m-print .toc-list{font-family:'DM Sans',sans-serif;font-size:11.5pt;line-height:1.7;color:#1A1A1A}
.m-print .toc-item{display:flex;align-items:baseline;gap:6pt;padding:3pt 0}
.m-print .toc-icon{flex-shrink:0;font-size:11pt}
.m-print .toc-text{flex:1;overflow:hidden}
.m-print .toc-pg{flex-shrink:0;min-width:18pt;text-align:right}
.m-print .sec-title{font-family:'DM Sans',sans-serif;font-size:20pt;color:#0F2044;margin-bottom:4pt;line-height:1.2}
.m-print .sub-title{font-size:13pt;color:#0F2044;margin-top:14pt}
.m-print .handbook-content{font-size:11pt;line-height:1.55;margin-top:10pt}
.m-print .handbook-content h3{font-size:13pt;margin-top:14pt}
.m-print .handbook-content h4{font-size:11.5pt}
.m-print .handbook-content p{font-size:11pt;margin-bottom:8pt}
.m-print .handbook-content ul,.m-print .handbook-content ol{margin:4pt 0 10pt 0;padding-left:1.2em}
.m-print .handbook-content li{font-size:11pt;margin:2pt 0}
.m-print .handbook-content table{font-size:10pt;margin:6pt 0 10pt;width:100%;border-collapse:collapse}
.m-print .handbook-content th{font-size:9pt;padding:5pt 8pt}
.m-print .handbook-content td{font-size:10pt;padding:4pt 8pt}
.m-print .sec-hero,.m-print .sec-tag{display:none!important}
.m-print .sec-divider{display:none!important}`;
  document.head.appendChild(st);
  document.body.appendChild(m);
  const tocEl=document.querySelector('.toc-page');
  let tocPages=1;
  if(tocEl){
    const tc=tocEl.cloneNode(true);
    tc.style.cssText='display:block;width:'+printW+'px';
    m.appendChild(tc);
    const measured=Math.max(1,Math.ceil(m.scrollHeight/printPageH));
    // Empirical floor: ~13 TOC items fit per page in actual print rendering
    // (emoji icons + 1.7 line-height make rows taller than CSS math predicts)
    const heuristic=Math.max(1,Math.ceil(SECTIONS.length/13));
    tocPages=Math.max(measured,heuristic);
    m.innerHTML='';
  }
  let pg=1+tocPages+1;
  SECTIONS.forEach(s=>{
    const span=document.querySelector(`[data-toc-sec="${s.id}"]`);
    if(span) span.textContent=pg;
    const el=document.getElementById('sec-'+s.id);
    if(el){
      const clone=el.cloneNode(true);
      clone.style.cssText='width:'+printW+'px;position:static;padding:0;margin:0;display:block';
      m.innerHTML='';
      m.appendChild(clone);
      pg+=1+Math.max(1,Math.ceil(m.scrollHeight/printPageH));
    }
  });
  document.body.removeChild(m);
  document.head.removeChild(st);
}

window.addEventListener('beforeprint',calcTocPages);

function scrollToSec(id){
  const el=document.getElementById('sec-'+id);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'start'});
    activeSec=id;
    updateNav();
  }
}

function updateNav(){
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('on',n.dataset.sec===activeSec);
  });
  document.querySelectorAll('.ti').forEach(t=>{
    t.classList.toggle('on',t.dataset.sec===activeSec);
  });
  const activeTab=document.querySelector('.ti.on');
  if(activeTab) activeTab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function initScrollspy(){
  if(typeof IntersectionObserver==='undefined') return;
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace('sec-','');
        if(id!==activeSec){
          activeSec=id;
          updateNav();
        }
      }
    });
  },{rootMargin:'-80px 0px -55% 0px',threshold:0});
  SECTIONS.forEach(s=>{
    const el=document.getElementById('sec-'+s.id);
    if(el) observer.observe(el);
  });
}

renderHdr();
renderSide();
renderTabs();
renderMain();
renderFoot();
renderCover();
renderToc();
initScrollspy();
</script>
</body>
</html>
