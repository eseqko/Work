<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Resource Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   TACTILE MAXIMALISM — Blue & Gold
   Rich textures, layered depth, ornamental gold details
═══════════════════════════════════════════════════════════ */
:root{
  --brand:#0F2044;--brand-mid:#1B3468;--brand-lt:#E2E8F3;
  --accent:#C8A64A;--accent-dk:#9A7B2E;--accent-lt:#F5EDD0;
  --gold-shine:linear-gradient(135deg,#D4B04A 0%,#E8D48B 45%,#C8A64A 75%,#A68A3A 100%);
  --bg:#FAF7F0;--surface:#FFFEF8;--text:#0F1B2D;--muted:#5C6B82;
  --border:#D4C9A8;--border-gold:#C8A64A33;
  --r:10px;--sw:230px;
  --font-d:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-b:'Cal Sans','DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-ui:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --sh-card:0 1px 3px rgba(15,32,68,.06),0 4px 14px rgba(15,32,68,.04);
  --sh-lift:0 2px 6px rgba(15,32,68,.1),0 10px 28px rgba(15,32,68,.07);
  --sh-inset:inset 0 2px 4px rgba(15,32,68,.05);
  --sh-gold:0 0 0 1px var(--accent),0 0 0 3px var(--surface),0 0 0 4px var(--border)
}
@font-face{font-family:'Cal Sans';font-synthesis:none}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text);font-size:16px;line-height:1.65;font-synthesis:none}
strong,b{font-family:var(--font-d);font-weight:700}
html[lang="ar"]{font-family:'Noto Sans Arabic','Arabic Typesetting',Arial,sans-serif}

/* Subtle texture overlay on body */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.022;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ── Header ─────────────────────────────────────────────── */
.hdr{background:linear-gradient(180deg,var(--brand) 0%,#0A1830 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:100;
  box-shadow:0 3px 12px rgba(15,32,68,.25),inset 0 -1px 0 var(--accent);
  border-bottom:2.5px solid var(--accent)}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{height:36px;width:auto;max-width:80px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,.92);padding:3px;border-radius:5px}
.hdr-title{font-family:var(--font-d);font-size:1.1rem;font-weight:700;line-height:1.2;letter-spacing:.3px}
.hdr-tag{font-size:.7rem;opacity:.65;font-weight:400;font-style:italic;font-family:var(--font-b)}
.lang-wrap{display:flex;gap:5px;flex-shrink:0}
.lb{background:rgba(255,255,255,.08);border:1px solid rgba(200,166,74,.35);color:rgba(255,255,255,.8);border-radius:6px;padding:4px 9px;font-family:var(--font-ui);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.lb:hover{background:rgba(200,166,74,.15);color:#fff;border-color:var(--accent)}
.lb.on{background:var(--gold-shine);border-color:var(--accent);color:var(--brand);font-weight:700;font-family:var(--font-d);box-shadow:0 1px 4px rgba(200,166,74,.4)}

/* ── Layout ─────────────────────────────────────────────── */
.wrap{display:flex;min-height:calc(100vh - 58px)}

/* ── Sidebar ────────────────────────────────────────────── */
.side{width:var(--sw);background:var(--surface);border-right:1.5px solid var(--border);padding:14px 0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;flex-shrink:0;
  box-shadow:inset -6px 0 12px -6px rgba(15,32,68,.04);
  background-image:linear-gradient(180deg,#FFFDF5 0%,#F8F4E8 100%)}
[dir=rtl] .side{border-right:none;border-left:1.5px solid var(--border);box-shadow:inset 6px 0 12px -6px rgba(15,32,68,.04)}
.ni{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-family:var(--font-ui);font-size:.84rem;font-weight:500;color:var(--muted);border-left:3.5px solid transparent;transition:all .2s;user-select:none;position:relative}
[dir=rtl] .ni{border-left:none;border-right:3.5px solid transparent}
.ni:hover{background:var(--brand-lt);color:var(--brand)}
.ni.on{background:linear-gradient(90deg,var(--brand-lt),transparent);color:var(--brand);border-left-color:var(--accent);font-weight:700;font-family:var(--font-d)}
[dir=rtl] .ni.on{border-left-color:transparent;border-right-color:var(--accent)}
.ni.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:3px 0 0 3px;opacity:.4}
[dir=rtl] .ni.on::after{right:auto;left:0;border-radius:0 3px 3px 0}
.ni-icon{font-size:1.1rem;flex-shrink:0}

/* ── Main ───────────────────────────────────────────────── */
.main{flex:1;padding:26px 24px;max-width:740px;min-width:0}
.sec-title{font-family:var(--font-d);font-size:1.5rem;font-weight:700;color:var(--brand);margin-bottom:2px;letter-spacing:.1px}
.sec-title::after{content:'';display:block;width:48px;height:3px;background:var(--gold-shine);border-radius:2px;margin-top:6px}
.sec-desc{font-size:.84rem;color:var(--muted);margin-bottom:18px;font-style:italic;font-family:var(--font-b)}

/* ── Translation notice ─────────────────────────────────── */
.t-note{background:var(--accent-lt);border:1.5px solid var(--accent);border-radius:var(--r);padding:10px 14px;font-family:var(--font-ui);font-size:.82rem;color:#78350F;margin-bottom:14px;box-shadow:var(--sh-card)}

/* ── Accordion ──────────────────────────────────────────── */
.acc{display:flex;flex-direction:column;gap:10px}
.ai{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;
  box-shadow:var(--sh-card);transition:all .25s ease;position:relative}
.ai::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold-shine);opacity:0;transition:opacity .25s}
.ai.open{border-color:var(--accent);box-shadow:var(--sh-lift)}
.ai.open::before{opacity:1}
.at{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:none;border:none;cursor:pointer;text-align:left;font-family:var(--font-d);font-size:.92rem;font-weight:600;color:var(--text);gap:10px;transition:background .15s}
[dir=rtl] .at{text-align:right}
.at:hover{background:linear-gradient(90deg,var(--brand-lt),transparent 80%)}
.ai.open .at{color:var(--brand);background:linear-gradient(180deg,var(--brand-lt) 0%,transparent 100%)}
.arr{font-size:.75rem;color:var(--accent);transition:transform .25s;flex-shrink:0;font-weight:700}
.ai.open .arr{transform:rotate(180deg);color:var(--brand)}
.ab{display:none;padding:0 16px 16px;font-size:.86rem;line-height:1.7;border-top:1px solid var(--border)}
.ai.open .ab{display:block;padding-top:14px}
.ab p{margin-bottom:9px}
.ab p:last-child{margin-bottom:0}
.ab ul,.ab ol{padding-left:1.3em;margin:6px 0 9px}
[dir=rtl] .ab ul,[dir=rtl] .ab ol{padding-left:0;padding-right:1.3em}
.ab li{margin:4px 0}
.ab li::marker{color:var(--accent)}
.ab strong{font-weight:700;color:var(--brand)}
.ab a{color:var(--brand-mid);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:2px;transition:color .15s}
.ab a:hover{color:var(--accent-dk)}

/* Tables inside accordion */
.ab table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem;margin:10px 0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--sh-inset)}
.ab th{background:var(--brand);color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-family:var(--font-d);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--accent)}
[dir=rtl] .ab th{text-align:right}
.ab td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.ab tr:last-child td{border-bottom:none}
.ab tr:nth-child(even) td{background:rgba(200,166,74,.04)}
.ab tr:hover td{background:rgba(200,166,74,.08)}

/* Callout boxes */
.callout{background:linear-gradient(135deg,var(--accent-lt),#FFF8E1);border-left:4px solid var(--accent);padding:11px 14px;border-radius:0 var(--r) var(--r) 0;margin:10px 0;font-size:.83rem;color:#5A4506;
  box-shadow:var(--sh-card);position:relative}
.callout::before{content:'';position:absolute;left:-4px;top:0;bottom:0;width:4px;background:var(--gold-shine);border-radius:4px 0 0 4px}
[dir=rtl] .callout{border-left:none;border-right:4px solid var(--accent);border-radius:var(--r) 0 0 var(--r)}
[dir=rtl] .callout::before{left:auto;right:-4px;border-radius:0 4px 4px 0}

/* Template/code boxes */
.tbox{background:linear-gradient(180deg,#F5F0E0,#EDE8D4);border:1.5px solid var(--border);border-radius:8px;padding:14px;font-family:var(--font-b);font-size:.84rem;line-height:1.8;margin:10px 0;white-space:pre-wrap;
  box-shadow:var(--sh-inset),var(--sh-card);position:relative}
.tbox::before{content:'';position:absolute;inset:3px;border:1px solid rgba(200,166,74,.15);border-radius:6px;pointer-events:none}

/* ── Footer ─────────────────────────────────────────────── */
.foot{background:var(--brand);border-top:2.5px solid var(--accent);padding:13px 20px;font-size:.8rem;color:rgba(255,255,255,.75);text-align:center;font-family:var(--font-b);font-style:italic;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.15)}

/* ── Mobile tab bar ─────────────────────────────────────── */
.tabs{display:none;overflow-x:auto;background:linear-gradient(180deg,var(--surface),#F8F4E8);border-bottom:2px solid var(--accent);position:sticky;top:58px;z-index:90;scrollbar-width:none;padding:0 6px;
  box-shadow:0 2px 8px rgba(15,32,68,.06)}
.tabs::-webkit-scrollbar{display:none}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;font-family:var(--font-ui);font-size:.68rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;flex-shrink:0;transition:all .15s}
.ti.on{color:var(--brand);border-bottom-color:var(--accent);font-weight:700;font-family:var(--font-d)}
.ti-icon{font-size:1rem}

@media(max-width:640px){
  .side{display:none}
  .tabs{display:flex}
  .wrap{flex-direction:column}
  .main{padding:16px}
  .sec-title{font-size:1.25rem}
}

/* ── Fade in ────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.main>*{animation:fadeIn .22s ease}

/* ══════════════════════════════════════════════════════════
   ASCA DOMAIN CHIPS
══════════════════════════════════════════════════════════ */
.domain-chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 16px}
.dchip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-family:var(--font-ui);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border:1.5px solid;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.dchip.ac{background:#E2E8F3;color:#0F2044;border-color:#B8C8E0}
.dchip.cc{background:var(--accent-lt);color:#6B5412;border-color:#D4C080}
.dchip.se{background:#E8F0E2;color:#1A3A14;border-color:#B8D0A8}

/* ── Tier pyramid ───────────────────────────────────────── */
.pyramid{display:flex;flex-direction:column;align-items:center;gap:5px;margin:12px auto;max-width:380px;font-size:.76rem;font-weight:700;font-family:var(--font-d);text-align:center}
.pyr-row{width:100%;padding:8px 12px;border-radius:8px;line-height:1.3;box-shadow:var(--sh-card);border:1.5px solid}
.pyr-3{width:48%;background:#FEE2E2;color:#7F1D1D;border-color:#FECACA}
.pyr-2{width:72%;background:#FEF3C7;color:#78350F;border-color:#FDE68A}
.pyr-1{width:100%;background:var(--brand-lt);color:var(--brand);border-color:#B8C8E0;font-size:.8rem}
.pyr-label{font-family:var(--font-ui);font-size:.64rem;opacity:.7;font-weight:600;margin-top:2px}

/* ── CCGI highlight card ────────────────────────────────── */
.ccgi-box{background:linear-gradient(135deg,#F8F6EE,var(--accent-lt));border:1.5px solid var(--border);border-left:4px solid var(--accent);border-radius:6px;padding:12px 14px;margin:10px 0;font-size:.85rem;box-shadow:var(--sh-card)}
[dir=rtl] .ccgi-box{border-left:1.5px solid var(--border);border-right:4px solid var(--accent)}

/* CTA buttons */
.cta-btn{display:inline-block;background:var(--brand);color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:600;font-size:.84rem;margin-top:6px;font-family:var(--font-d);letter-spacing:.2px;
  box-shadow:0 2px 6px rgba(15,32,68,.2);transition:all .2s;border:1.5px solid var(--brand)}
.cta-btn:hover{background:var(--brand-mid);box-shadow:0 4px 12px rgba(15,32,68,.25);transform:translateY(-1px)}
.cta-btn.outline{background:transparent;color:var(--brand);border:1.5px solid var(--accent);box-shadow:none}
.cta-btn.outline:hover{background:var(--accent-lt);box-shadow:var(--sh-card)}
.cta-btn.gold{background:var(--gold-shine);color:var(--brand);border-color:var(--accent-dk);box-shadow:0 2px 8px rgba(200,166,74,.3)}
.cta-btn.gold:hover{box-shadow:0 4px 16px rgba(200,166,74,.4);transform:translateY(-1px)}

/* ── Numbered step list ─────────────────────────────────── */
.steps{counter-reset:step;list-style:none;padding:0;margin:10px 0}
.steps>li{counter-increment:step;position:relative;padding:0 0 12px 42px;min-height:30px}
.steps>li::before{content:counter(step);position:absolute;left:0;top:0;width:28px;height:28px;border-radius:50%;background:var(--gold-shine);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;font-family:var(--font-d);
  box-shadow:0 2px 4px rgba(200,166,74,.3)}
[dir=rtl] .steps>li{padding:0 42px 12px 0}
[dir=rtl] .steps>li::before{left:auto;right:0}

/* ── Section card grid ──────────────────────────────────── */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:12px 0}
.sec-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 13px;cursor:pointer;transition:all .2s;text-align:left;box-shadow:var(--sh-card);position:relative;overflow:hidden}
.sec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold-shine);opacity:0;transition:opacity .2s}
.sec-card:hover{border-color:var(--accent);box-shadow:var(--sh-lift);transform:translateY(-2px)}
.sec-card:hover::before{opacity:1}
.sec-card .sc-title{font-family:var(--font-d);font-weight:600;color:var(--text);font-size:.84rem;margin:4px 0 3px}
.sec-card .sc-icon{font-size:1.5rem}
.sec-card .sc-domains{display:flex;gap:3px;margin-top:5px}
.sec-card .sc-domains .dchip{font-size:.56rem;padding:2px 6px}

/* ── Decorative gold divider (usable anywhere) ──────────── */
.gold-rule{border:none;height:1.5px;background:var(--gold-shine);margin:16px 0;opacity:.5}
</style>
</head>
<body>
<script src="school-config.js"></script>
<script src="school-data.js"></script>
<script>
// Apply school colors from SchoolConfig (overrides blue & gold defaults)
(function(){
  if (!window.SchoolConfig) return;
  const cfg = SchoolConfig.load();
  if (cfg.colors && cfg.colors.primary) {
    const root = document.documentElement.style;
    root.setProperty('--brand', cfg.colors.primary);
    root.setProperty('--brand-mid', SchoolConfig.colorUtils.lighten(cfg.colors.primary, 15));
    root.setProperty('--brand-lt', SchoolConfig.colorUtils.lighten(cfg.colors.primary, 45));
  }
  if (cfg.colors && cfg.colors.secondary) {
    const root = document.documentElement.style;
    root.setProperty('--accent', cfg.colors.secondary);
    root.setProperty('--accent-dk', cfg.colors.secondary);
    root.setProperty('--accent-lt', SchoolConfig.colorUtils.lighten(cfg.colors.secondary, 35));
  }
  if (cfg.setupComplete && cfg.schoolName) {
    document.title = cfg.schoolName + ' Student Resource Hub';
  }
})();
</script>
<div id="hdr"></div>
<div class="tabs" id="tabs"></div>
<div class="wrap">
  <nav class="side" id="side"></nav>
  <main class="main" id="main"></main>
</div>
<div id="foot"></div>
<script>
const LANG={
en:{
  meta:{title:"Student Resource Hub",tag:"Know your rights. Know your options.",footer:"For your specific situation, visit the counseling office in person — we're here for you.",notice:null},
  nav:[
    {id:"start",icon:"👋",label:"Start Here"},
    {id:"graduation",icon:"🎓",label:"Graduation"},
    {id:"college",icon:"📚",label:"College Prep"},
    {id:"ccgi",icon:"🧭",label:"CaliforniaColleges.edu"},
    {id:"aid",icon:"💰",label:"Financial Aid"},
    {id:"rights",icon:"⚖️",label:"Your Rights"},
    {id:"advocacy",icon:"✉️",label:"Self-Advocacy"},
    {id:"handbook",icon:"📋",label:"Handbook"},
    {id:"support",icon:"💚",label:"Support"},
    {id:"catalog",icon:"📖",label:"Course Catalog"}
  ],
  sections:{
    start:{title:"Welcome — Start Here",desc:"One place for everything you need. Available to every student, any time.",domains:['ac','cc','se'],items:[
      {q:"What is this Hub?",a:`<p>This is your <strong>one-stop shop</strong> for school information — built so that <strong>every student</strong> can find answers, make plans, and get connected to support without having to make an appointment first.</p>
<p>We organize everything around the three areas that shape your life at school:</p>
<div style="display:grid;grid-template-columns:1fr;gap:8px;margin:10px 0">
  <div class="ccgi-box" style="border-left-color:#1E3A8A"><strong>📘 Academic</strong> — Graduation requirements, A-G, course catalog, handbook policies.</div>
  <div class="ccgi-box" style="border-left-color:#92400E"><strong>🧭 College / Career</strong> — Post-secondary options, financial aid, CaliforniaColleges.edu, career exploration.</div>
  <div class="ccgi-box" style="border-left-color:#14532D"><strong>💚 Social / Emotional</strong> — Your rights, self-advocacy tools, crisis resources, school support.</div>
</div>
<p style="margin-top:10px">Every section tells you what's available, who to talk to, and how to speak up for yourself. When this isn't enough, we'll always point you to the next step.</p>`},
      {q:"How does this fit into the bigger picture? (ASCA / MTSS)",a:`<p>Your school counseling program is organized into <strong>tiers</strong> so that everyone gets support, and students who need more get more. This Hub is the first tier — the one that's for <em>everyone</em>.</p>
<div class="pyramid">
  <div class="pyr-row pyr-3">TIER 3 — Individual Counseling · Referral to Resources<div class="pyr-label">FEW students</div></div>
  <div class="pyr-row pyr-2">TIER 2 — Small Groups · Consultation<div class="pyr-label">SOME students</div></div>
  <div class="pyr-row pyr-1">TIER 1 — This Hub · Course Catalog · CaliforniaColleges.edu<div class="pyr-label">ALL students</div></div>
</div>
<p><strong>Tier 1 (where this Hub lives)</strong> is <em>universal</em>. It includes Individual Student Planning (your courses, A-G, 4-year plan) and School-Wide Activities (handbook, rights, support resources). You don't need permission — you just use it.</p>
<p><strong>Tier 2 &amp; Tier 3</strong> are where your counselor works with you one-on-one or in small groups. Every section of this Hub points to those next steps when you need them.</p>
<div class="callout">💡 <strong>Self-advocacy starts at Tier 1.</strong> Using this Hub, checking your own progress in CaliforniaColleges.edu, and walking into meetings prepared — that <em>is</em> advocacy.</div>`},
      {q:"Where should I start?",a:`<div class="sec-grid">
  <div class="sec-card" onclick="go('ccgi')"><div class="sc-icon">🧭</div><div class="sc-title">CaliforniaColleges.edu</div><div class="sc-domains"><span class="dchip ac">AC</span><span class="dchip cc">CC</span><span class="dchip se">SE</span></div></div>
  <div class="sec-card" onclick="go('graduation')"><div class="sc-icon">🎓</div><div class="sc-title">Graduation</div><div class="sc-domains"><span class="dchip ac">AC</span></div></div>
  <div class="sec-card" onclick="go('college')"><div class="sc-icon">📚</div><div class="sc-title">College Prep &amp; A-G</div><div class="sc-domains"><span class="dchip ac">AC</span><span class="dchip cc">CC</span></div></div>
  <div class="sec-card" onclick="go('aid')"><div class="sc-icon">💰</div><div class="sc-title">Financial Aid</div><div class="sc-domains"><span class="dchip cc">CC</span></div></div>
  <div class="sec-card" onclick="go('advocacy')"><div class="sc-icon">✉️</div><div class="sc-title">Self-Advocacy</div><div class="sc-domains"><span class="dchip se">SE</span></div></div>
  <div class="sec-card" onclick="go('rights')"><div class="sc-icon">⚖️</div><div class="sc-title">Your Rights</div><div class="sc-domains"><span class="dchip se">SE</span></div></div>
  <div class="sec-card" onclick="go('support')"><div class="sc-icon">💚</div><div class="sc-title">Support</div><div class="sc-domains"><span class="dchip se">SE</span></div></div>
  <div class="sec-card" onclick="go('handbook')"><div class="sc-icon">📋</div><div class="sc-title">Handbook</div><div class="sc-domains"><span class="dchip ac">AC</span></div></div>
  <div class="sec-card" onclick="go('catalog')"><div class="sc-icon">📖</div><div class="sc-title">Course Catalog</div><div class="sc-domains"><span class="dchip ac">AC</span></div></div>
</div>
<p style="margin-top:6px;font-size:.82rem;color:#6B7280">Not sure? Start with <strong>CaliforniaColleges.edu</strong> — it's the one tool that connects all three areas.</p>`}
    ]},
    graduation:{title:"Graduation Requirements",desc:"What you need to earn your diploma.",domains:['ac'],items:[
      {q:"What do I need to graduate?",a:(()=>{
        const sd=getSD();
        const total=sdVal('gradTotalCredits','');
        const rows=gradRows();
        return `<p>To graduate you must earn a required number of <strong>credits</strong> across specific subject areas. One semester-long class typically earns 5 credits.${total?` Total credits required: <strong>${total}</strong>.`:''}</p>`+
        (rows?`<table>${rows}</table>`
             :`<div class="callout">📌 Graduation credit requirements not filled in yet. Use the editor to add your school's numbers.</div>`);
      })()},
      {q:"How do I check my credits?",a:(()=>{
        const custom=sdVal('gradCreditCheck','');
        if(custom){
          return `<p>At our school:</p>${renderSD(custom)}
<div class="callout">📌 Check at the start of every school year so you're never caught off guard senior year.</div>`;
        }
        return `<p>Three ways to check your credit status:</p>
<ul><li><strong>Aeries / StudentVUE:</strong> Log in and look for "Transcript" or "Graduation Progress."</li>
<li><strong>Ask your counselor</strong> for a <em>credit audit</em> — a printed summary of where you stand.</li>
<li><strong>Unofficial transcript</strong> from the front office or student portal.</li></ul>
<p>Check at the start of every school year so you're never caught off guard senior year.</p>`;
      })()},
      {q:"I'm behind on credits — what are my options?",a:`<p>There are usually several paths. The sooner you make a plan, the more options you'll have.</p>
<ul><li><strong>Credit recovery courses</strong> — online or in-person retakes</li>
<li><strong>Summer school</strong> — fast way to earn credits</li>
<li><strong>After-school / Saturday programs</strong> — check with your school</li>
<li><strong>Community college dual enrollment</strong> — available to 11th &amp; 12th graders in many districts</li>
<li><strong>Independent study</strong> — for students with special circumstances</li>
<li><strong>Adult education</strong> — if you're 18+, another path to a diploma</li></ul>
<div class="callout">📌 Don't wait until senior year. Make a plan with your counselor now.</div>`},
      {q:"What other requirements are there?",a:`<p>Beyond credits, some schools may require a senior project, community service hours, or passing an assessment. Your school's specific requirements:</p>`+sdBlock('gradOtherRequirements','Add your school\'s non-credit graduation requirements in the editor.')}
    ]},
    college:{title:"College Prep & A-G Requirements",desc:"Understanding your options after high school.",domains:['ac','cc'],items:[
      {q:"What are A-G requirements?",a:`<p><strong>A-G requirements</strong> are the specific courses you need to be eligible to apply to a UC or CSU. They are <em>separate</em> from graduation requirements — you can graduate without them, but you won't be UC/CSU eligible.</p>
<div class="callout">💡 Completing A-G keeps more doors open, even if you're unsure about college now.</div>`},
      {q:"The 7 A-G subject areas",a:`<table><tr><th>Area</th><th>Subject</th><th>Required</th></tr>
<tr><td><strong>A</strong></td><td>History / Social Science</td><td>2 years</td></tr>
<tr><td><strong>B</strong></td><td>English</td><td>4 years</td></tr>
<tr><td><strong>C</strong></td><td>Math (Algebra 1+)</td><td>3 years (4 rec.)</td></tr>
<tr><td><strong>D</strong></td><td>Laboratory Science</td><td>2 years (3 rec.)</td></tr>
<tr><td><strong>E</strong></td><td>Language Other Than English</td><td>2 years, same language</td></tr>
<tr><td><strong>F</strong></td><td>Visual &amp; Performing Arts</td><td>1 year</td></tr>
<tr><td><strong>G</strong></td><td>College-Prep Elective</td><td>1 year</td></tr></table>
<p><strong>Key rule:</strong> You must earn a <strong>C or better</strong> — a D does not count. Only UC/CSU-approved courses qualify; ask your counselor which classes at your school count.</p>`},
      {q:"UC vs CSU vs Community College",a:`<table><tr><th></th><th>UC</th><th>CSU</th><th>Community College</th></tr>
<tr><td><strong>Examples</strong></td><td>UCLA, UC Berkeley, UCSD</td><td>CSUN, Cal State LA, SDSU</td><td>Local CC</td></tr>
<tr><td><strong>A-G required?</strong></td><td>Yes</td><td>Yes</td><td>No</td></tr>
<tr><td><strong>Cost</strong></td><td>Higher (aid available)</td><td>Moderate (aid available)</td><td>Very low / free with aid</td></tr>
<tr><td><strong>Transfer path</strong></td><td>Can transfer from CC</td><td>Can transfer from CC</td><td>Transfers to UC/CSU</td></tr></table>
<div class="callout">💡 Community college is a completely valid path. Many students transfer to UC/CSU after 2 years — sometimes with a guaranteed spot (TAG agreement).</div>`},
      {q:"Am I on track? How do I check?",a:`<p>Ask your counselor for a <em>graduation and A-G audit</em>. It shows which areas you've completed, which you're in, and what's still missing.</p>
<div class="ccgi-box">🧭 <strong>Check it yourself right now</strong> — CaliforniaColleges.edu shows your real A-G progress using your actual transcript. <a href="#" onclick="go('ccgi');return false;" class="cta-btn outline" style="margin-top:8px">How to use CCGI →</a></div>
<p><strong>General timeline:</strong></p>
<ul><li><strong>9th:</strong> Start strong — GPA counts from day one</li>
<li><strong>10th:</strong> Take the PSAT; check your A-G progress</li>
<li><strong>11th:</strong> SAT/ACT if needed; visit colleges; meet with your counselor about applications</li>
<li><strong>12th:</strong> Apply to UCs/CSUs by November 30; watch each school's deadlines</li></ul>`}
    ]},
    ccgi:{title:"CaliforniaColleges.edu — Your Self-Advocacy Toolkit",desc:"One tool for all three ASCA domains. Free. Linked to your real transcript. Use it to check your own progress and walk into every meeting prepared.",domains:['ac','cc','se'],items:[
      {q:"What is CaliforniaColleges.edu — and why is it yours?",a:`<p><strong>CaliforniaColleges.edu</strong> (sometimes called <strong>CCGI</strong>) is California's free, state-run planning platform for all 7th–12th graders in the state. Your account is <strong>already linked to your real transcript</strong> — not a copy you type in, not a screenshot, the actual course and grade data your school reports.</p>
<p>That matters because it's the only place you can see, in one view:</p>
<ul>
  <li>📘 Your real-time <strong>A-G progress</strong> from the grades you've actually earned</li>
  <li>🧭 A personal <strong>4-year plan</strong> you can update as you go</li>
  <li>🧭 The full <strong>College Dashboard</strong> — UCs, CSUs, privates, community colleges</li>
  <li>🧭 A <strong>Career Dashboard</strong> with interest inventories and career matches</li>
  <li>💚 An <strong>Action Plan</strong> to track every deadline — FAFSA, CADAA, applications, scholarships</li>
</ul>
<div class="callout">💡 <strong>This is your account.</strong> Not your counselor's, not your school's — yours. Self-advocacy starts with knowing what's already available to you.</div>
<p style="margin-top:10px"><a href="https://www.californiacolleges.edu" target="_blank" class="cta-btn">🧭 Go to CaliforniaColleges.edu →</a></p>`},
      {q:"How do I sign in at our school?",a:(()=>{
        const v=sdVal('ccgiSignIn','');
        if(v){
          return renderSD(v)+
          `<div class="callout">🔒 If you get locked out or your account isn't linked yet, talk to your counselor or the CCGI point person listed below.</div>`;
        }
        return `<p>Most California schools connect to CaliforniaColleges.edu through your school email or district single sign-on (SSO). Try these in order:</p>
<ol class="steps">
  <li>Go to <strong><a href="https://www.californiacolleges.edu" target="_blank">californiacolleges.edu</a></strong> and click <strong>Sign In</strong>.</li>
  <li>Choose "<strong>Sign in with Google</strong>" or "<strong>Clever</strong>" and use your school email.</li>
  <li>If that doesn't work, try "<strong>Sign in with California Colleges</strong>" and use the credentials your school provided.</li>
  <li>If you're still locked out, ask your counselor — your account just needs to be linked to your student ID.</li>
</ol>
<div class="callout">📌 Your counselor can add the exact sign-in steps for our school in this Hub's editor.</div>`;
      })()},
      {q:"📘 Academic — Check your A-G progress (the Courses tab)",a:`<p>This is the self-advocacy superpower. CCGI pulls your real transcript and shows exactly where you stand on each A-G subject area.</p>
<ol class="steps">
  <li>Sign in → click <strong>Dashboard</strong>.</li>
  <li>Open the <strong>Courses</strong> tab.</li>
  <li>Scroll through each A-G area (A through G) — you'll see every course you've taken, its grade, and whether it counts.</li>
  <li>Look for <strong>green checks</strong> (on track), <strong>yellow</strong> (in progress), and <strong>anything missing or miscoded</strong>.</li>
</ol>
<p><strong>Your monthly self-check — do this at the start of every semester:</strong></p>
<ul>
  <li>✅ Are all my semester grades posted?</li>
  <li>✅ Is every A-G course correctly flagged?</li>
  <li>⚠️ Any gaps for this year? Any "D" grades that need retaking?</li>
  <li>⚠️ Anything that should count but isn't counting?</li>
</ul>
<div class="callout">📌 Catch mistakes <em>early</em>. Grade miscodes happen — fixing them in November is a lot easier than in May of senior year. If you see something wrong, email your counselor with a screenshot.</div>`},
      {q:"📘 Academic — Build your 4-year plan",a:`<p>Your 4-year plan is a living document you can update every semester. It's where you see the whole picture — not just this year.</p>
<ol class="steps">
  <li>Dashboard → <strong>Plan</strong> tab → "<strong>My 4-Year Plan</strong>".</li>
  <li>Start with your completed courses (already filled in from your transcript).</li>
  <li>Drag and drop courses into future semesters — the tool flags conflicts and A-G gaps.</li>
  <li>Save a draft. Update it every time you pick classes for next year.</li>
</ol>
<div class="ccgi-box">💡 <strong>Pro tip:</strong> Open our <a href="catalog.html#4year" target="_blank">Sample Four-Year Plans</a> side-by-side with CCGI. Use the sample as your starting template, then personalize it for your pathway in CCGI.</div>`},
      {q:"🧭 College / Career — Explore colleges (College Dashboard)",a:`<p>Search, compare, and save colleges from one place.</p>
<ol class="steps">
  <li>Click the <strong>College</strong> tab.</li>
  <li>Filter by system (UC, CSU, CCC, private), location, major, size, cost.</li>
  <li>Open any college to see admission requirements, cost of attendance, average GPA, and financial aid stats.</li>
  <li><strong>Heart/save</strong> colleges you're interested in — they'll live in your "My Colleges" list.</li>
</ol>
<p><strong>Self-advocacy move:</strong> Come to your junior/senior counselor meeting with 3-5 saved colleges already. That turns a generic "let's talk college" into a specific conversation about <em>your</em> list, <em>your</em> requirements, and <em>your</em> plan.</p>`},
      {q:"🧭 College / Career — Explore careers (Career Dashboard)",a:`<p>Not sure what you want to do? Start here.</p>
<ol class="steps">
  <li>Click the <strong>Career</strong> tab.</li>
  <li>Take the <strong>interest inventory</strong> (takes ~10 minutes).</li>
  <li>Browse your <strong>career matches</strong> — each one shows typical salary, education required, and day-in-the-life videos.</li>
  <li>Save careers that sound interesting — you can revisit them any time.</li>
</ol>
<div class="callout">💡 Your career interests will change — that's normal and healthy. The point isn't to lock in an answer at 15, it's to have a few directions to explore.</div>`},
      {q:"💰 College / Career — My Action Plan &amp; Financial Aid",a:`<p>This is where CCGI helps you <strong>not miss deadlines</strong>.</p>
<ol class="steps">
  <li>Dashboard → <strong>My Action Plan</strong>.</li>
  <li>Check off each task by grade level — CCGI shows what's due this year.</li>
  <li>The <strong>Financial Aid</strong> section walks you through FAFSA or CADAA step by step.</li>
  <li>Application deadlines for every saved college appear in one calendar view.</li>
</ol>
<p>Pair this with our <a href="#" onclick="go('aid');return false;">Financial Aid section</a> in this Hub for the "why" behind each step.</p>`},
      {q:"💚 Social / Emotional — Your data, your voice",a:(()=>{
        const custom=sdVal('ccgiDataVoice','');
        const base=`<p>Here's the thing schools don't always say out loud: <strong>the data in CCGI is what adults look at when they decide how you're doing.</strong> Your A-G progress, your saved colleges, your 4-year plan, your career inventory — all of that shows up in counselor conversations.</p>
<p>That's not scary. It's <em>power</em>. Because it also means:</p>
<ul>
  <li>When you <strong>keep your plan current</strong>, you're literally shaping the conversation.</li>
  <li>When you <strong>catch a miscoded A-G course</strong>, you're advocating for yourself in a way that matters on transcripts and applications.</li>
  <li>When you <strong>walk into a meeting with CCGI open</strong>, you're showing up as a participant in your own plan — not just a passenger.</li>
</ul>
<div class="callout">💪 <strong>Self-advocacy isn't about being loud.</strong> It's about being prepared, being accurate, and knowing what's available. CCGI hands you all three.</div>`;
        return base+(custom?`<div style="margin-top:10px"><strong>At our school:</strong>${renderSD(custom)}</div>`:'');
      })()},
      {q:"Be your own best advocate — use CCGI in meetings",a:(()=>{
        const contact=sdVal('ccgiContactStaff','');
        const notes=sdVal('ccgiSchoolNotes','');
        const base=`<p>Before your next counselor meeting, spend 10 minutes in CCGI and bring 3 things:</p>
<ol class="steps">
  <li>🖼️ A <strong>screenshot of your A-G Courses tab</strong> (green/yellow/red at a glance)</li>
  <li>📝 Your <strong>current 4-year plan</strong> — even if it's messy, bring it</li>
  <li>❓ <strong>1–3 specific questions</strong> you have after reviewing both</li>
</ol>
<div class="callout">🗣️ <strong>Sample opener:</strong> "I looked at my CCGI Courses tab and noticed [X]. I want to make sure I'm on track for [goal]. Can we look at it together?"</div>
<p>This turns your counselor meeting from a generic check-in into a focused working session. It respects their time and centers <em>your</em> priorities.</p>`;
        let tail='';
        if(contact) tail+=`<div style="margin-top:12px"><strong>CCGI point person at our school:</strong>${renderSD(contact)}</div>`;
        if(notes) tail+=`<div style="margin-top:10px"><strong>Our school's CCGI workflow:</strong>${renderSD(notes)}</div>`;
        return base+tail;
      })()}
    ]},
    aid:{title:"Financial Aid & Scholarships",desc:"How to pay for college — there's more help than you think.",domains:['cc'],items:[
      {q:"What is FAFSA?",a:`<p><strong>FAFSA</strong> = Free Application for Federal Student Aid. It's the form that determines how much financial aid you can receive for college. It is <strong>free to submit</strong>.</p>
<div class="callout">📌 Apply even if you think your family earns too much. Many students are surprised. There's no downside to applying.</div>
<p><strong>Apply at:</strong> studentaid.gov &nbsp;|&nbsp; <strong>You'll need:</strong> Your SSN, parent's tax info, and an FSA ID (created at studentaid.gov — both you and a parent need one).</p>`},
      {q:"I'm undocumented — can I still get aid?",a:`<p>Yes. California has the <strong>California Dream Act Application (CADAA)</strong> for students who are not eligible for federal FAFSA — including many undocumented students and DACA recipients.</p>
<p>CADAA gives access to: Cal Grant, institutional grants from many CA colleges, and some scholarships.</p>
<p><strong>Apply at:</strong> dream.csac.ca.gov</p>
<div class="callout">🔒 Your information on the Dream Act application is protected by California state law — it cannot be shared with immigration enforcement. Talk to your counselor confidentially.</div>`},
      {q:"Grants vs scholarships vs loans",a:`<table><tr><th>Type</th><th>What it is</th><th>Repay?</th></tr>
<tr><td><strong>Grant</strong></td><td>Need-based aid from federal/state government</td><td>No</td></tr>
<tr><td><strong>Scholarship</strong></td><td>Merit or identity-based award from schools or organizations</td><td>No</td></tr>
<tr><td><strong>Work-Study</strong></td><td>Part-time campus job funded by financial aid</td><td>No — it's earned</td></tr>
<tr><td><strong>Loan</strong></td><td>Borrowed money</td><td>Yes, with interest</td></tr></table>
<p>Always exhaust grants and scholarships before taking out loans.</p>`},
      {q:"Key deadlines",a:`<ul><li><strong>FAFSA opens:</strong> October 1 of your senior year</li>
<li><strong>California Cal Grant deadline:</strong> March 2 — this one is strict</li>
<li><strong>Federal deadline:</strong> June 30 of the award year</li>
<li><strong>Each college's priority deadline:</strong> Usually December–February — check each school's website</li></ul>
<div class="callout">⏰ Earlier = more money. Some aid is first-come, first-served.</div>`},
      {q:"Local and school scholarships",a:`<p>Free scholarship search tools: <strong>Scholarships.com</strong>, <strong>Fastweb</strong>, your college's financial aid office, and organizations tied to your heritage or career interests.</p>`+sdBlock('aidLocalScholarships','Add local scholarships with deadlines and application info in the editor.')}
    ]},
    rights:{title:"Your Rights as a Student",desc:"You have more rights than you might know.",domains:['se'],items:[
      {q:"My right to a free education",a:`<p>Every student in the U.S. has the right to a free public education <strong>regardless of immigration status</strong>. This was established by the Supreme Court in <em>Plyler v. Doe</em> (1982).</p>
<p>Schools <strong>cannot</strong> ask about your immigration status, require a Social Security Number for enrollment, or deny you enrollment based on where you're from.</p>
<div class="callout">🔒 If anyone at school asks about your immigration status, you don't have to answer. You can speak with your counselor confidentially.</div>`},
      {q:"What is an IEP?",a:`<p>An <strong>IEP (Individualized Education Program)</strong> is a legal document for students who qualify for special education. It outlines your needs, goals, and the services the school must provide.</p>
<p><strong>Your rights:</strong></p>
<ul><li>You have the right to attend your own IEP meeting</li>
<li>You can bring an advocate or support person</li>
<li>All documents must be available in your home language</li>
<li>The school is legally required to follow your IEP — if they're not, tell your counselor</li></ul>`},
      {q:"What is a 504 Plan?",a:`<p>A <strong>504 Plan</strong> provides accommodations for students with disabilities who don't qualify for special education. It ensures equal access to learning.</p>
<p><strong>Common accommodations:</strong> Extended time on tests, quiet testing room, preferential seating, printed notes, movement breaks.</p>
<p>If you think you'd benefit from a 504, talk to your counselor and put your request in writing.</p>`},
      {q:"What is an SST meeting?",a:`<p>An <strong>SST (Student Study Team)</strong> meeting is a general education meeting — not special education — where teachers, parents, and the student discuss challenges and make a support plan together.</p>
<p>It is often the first step before an IEP or 504 evaluation. <strong>You can request one at any time</strong> if you feel you need more support.</p>`},
      {q:"My rights around discipline",a:`<p>Before being suspended, schools must: tell you what you're accused of, give you a chance to share your side, and notify your parents or guardians.</p>
<p>California law restricts suspensions for "willful defiance." If you believe you were disciplined unfairly: ask for a copy of the disciplinary record, request a meeting with a parent/guardian, and ask your counselor about the appeals process.</p>`}
    ]},
    advocacy:{title:"Self-Advocacy",desc:"How to speak up, ask for help, and get what you need.",domains:['se'],items:[
      {q:"How to email a teacher",a:`<p>A good email is short, respectful, and specific. Copy and adapt this template:</p>
<div class="tbox">Subject: Question about [Class Name] — [Your Name], Period [X]

Hi [Teacher's name],

My name is [Your Name] and I'm in your [class] class, Period [X].

I'm reaching out because [briefly explain: "I missed class on [date] and want to get the work I missed" / "I'm struggling with [topic] and would like extra help" / "I have a question about my grade on [assignment]"].

Would it be possible to [what you need: "share the assignments I missed" / "meet during office hours" / "review my grade with me"]?

Thank you for your time.
[Your Name]</div>
<p><strong>Tips:</strong> Use your school email. Give teachers 24–48 hrs to reply. Be specific — they get a lot of emails.</p>`},
      {q:"Preparing for a counselor meeting",a:`<p><strong>Before:</strong> Write down your 1–2 main topics. Bring relevant documents. Know the outcome you want (schedule change? credit check? help with a conflict?).</p>
<p><strong>During:</strong> It's okay to say "I don't understand — can you explain that?" or "I want to think before I decide." Ask for next steps in writing.</p>
<p><strong>After:</strong> Follow through on your end. If something was supposed to happen and didn't, send a short follow-up email.</p>`},
      {q:"How to request accommodations",a:`<p><strong>If you have an IEP or 504:</strong> Remind your teachers at the start of each semester — this is normal. If a teacher isn't following your plan, document it and tell your counselor.</p>
<p><strong>If you think you need accommodations:</strong></p>
<ol><li>Talk to your counselor or a trusted teacher</li>
<li>Put your request in writing (email is fine)</li>
<li>Ask for a referral to an SST, and then possibly an IEP or 504 evaluation</li></ol>
<div class="callout">📌 In California, once a parent requests a special education evaluation in writing, the school has 60 days to complete it.</div>`},
      {q:"What if I feel like no one is listening?",a:`<ol><li><strong>Document everything</strong> — dates, what was said, who was there. Emails create a paper trail.</li>
<li><strong>Go up the chain</strong> — teacher → counselor → department head → assistant principal → principal</li>
<li><strong>Bring someone with you</strong> — a parent, guardian, or trusted adult can attend meetings and advocate with you</li>
<li><strong>Know your options</strong> — you or your parent can file a formal complaint with the district or the California Department of Education</li></ol>
<p>You don't have to navigate this alone. That's what the counseling office is here for.</p>`},
      {q:"Advocating in another language",a:`<p>You have the right to communicate with the school in your home language. Schools receiving federal funding must provide meaningful access for non-English-speaking families.</p>
<ul><li>You can request an interpreter for any meeting (IEP, SST, disciplinary hearing)</li>
<li>Key documents must be translated into your home language upon request</li>
<li>The school cannot require you to bring your own interpreter</li></ul>`+sdBlock('advocacyBilingualContact','Add your bilingual staff or parent/student liaison contact info in the editor.')}
    ]},
    handbook:{title:"School Handbook",desc:"Key school policies in plain language.",domains:['ac'],items:[
      {q:"Open the full Student Handbook",a:`<p>The Student Handbook contains all school policies, schedules, and important information in one searchable document.</p>
<p style="margin-top:12px"><a href="handbook.html" target="_blank" class="cta-btn">📋 Open Student Handbook →</a></p>
<p style="margin-top:10px;font-size:.82rem;color:#6B7280">Opens in a new tab. Use the back button to return here.</p>`},
      {q:"Quick reference — key policies",a:(()=>{
      const sd=getSD();
      const fields=[['handbookAttendance','Attendance & tardies'],['handbookCellPhone','Technology policy'],['handbookDressCode','Dress code'],['handbookAcademicHonesty','Academic integrity'],['handbookGrading','Grading & appeals'],['handbookDiscipline','Discipline procedures'],['handbookScheduleChange','Schedule changes'],['handbookCampusAccess','Campus access']];
      const filled=fields.filter(([k])=>sdVal(k,''));
      if(!filled.length) return '<div class="callout">📌 Handbook policies not filled in yet. Use the editor to add your school\'s key policies, or open the full handbook above.</div>';
      return '<p>Quick summaries of key policies (see the full handbook for complete details):</p>'+filled.map(([k,label])=>`<div style="margin-bottom:12px"><strong>${label}:</strong>${renderSD(sd[k])}</div>`).join('');
    })()}
    ]},
    support:{title:"Support & Resources",desc:"You don't have to go through hard things alone.",domains:['se'],items:[
      {q:"Crisis resources — if you need help right now",a:`<p>If someone is in immediate danger, <strong>call 911</strong>.</p>
<table><tr><th>Resource</th><th>Contact</th><th>Hours</th></tr>
<tr><td><strong>988 Suicide &amp; Crisis Lifeline</strong></td><td>Call or text <strong>988</strong></td><td>24/7</td></tr>
<tr><td><strong>Crisis Text Line</strong></td><td>Text <strong>HOME</strong> to <strong>741741</strong></td><td>24/7</td></tr>

// ── Translations (injected by Student Hub Editor via DeepL) ──────────────────
// The editor's translate tool bakes Spanish/Arabic copies of LANG.en into the
// TRANSLATIONS constant below when you download the translated hub.html.
// It also writes a live copy to localStorage.grizznet_translations, which we
// merge in first so the preview iframe reflects translations immediately.
/* TRANSLATIONS_START */
const TRANSLATIONS = {};
/* TRANSLATIONS_END */

(function mergeTranslations(){
  let live=null;
  try{
    const raw=localStorage.getItem('grizznet_translations');
    if(raw) live=JSON.parse(raw);
  }catch(e){}
  const merged=Object.assign({}, TRANSLATIONS||{}, live||{});
  ['es','ar','fil'].forEach(code=>{
    const t=merged[code];
    if(!t || typeof t!=='object') return;
    if(!LANG[code]) return;
    if(t.meta) LANG[code].meta=Object.assign({}, LANG[code].meta, t.meta);
    if(Array.isArray(t.nav) && t.nav.length) LANG[code].nav=t.nav;
    if(t.sections && typeof t.sections==='object') LANG[code].sections=t.sections;
  });
})();

// ── School data helper ─────────────────────────────────────────────────────
// Checks localStorage for an editor draft first, then falls back to school-data.js
function getSD(){
  const base=(typeof SCHOOL_DATA!=='undefined')?Object.assign({},SCHOOL_DATA):{};
  try{
    const raw=localStorage.getItem('grizznet_draft');
    if(raw){const d=JSON.parse(raw);if(d&&typeof d==='object'){
      for(const k in d){if(!isBlank(d[k]))base[k]=d[k];}
    }}
  }catch(e){}
  return base;
}

// Read Course Catalog's imported info (grad reqs, counselors, etc.)
// so hub fields auto-populate from the DOCX importer when hub editor is blank.
function getCatalogInfo(){
  try{
    const raw=localStorage.getItem('jhs_catalog_info');
    return raw?JSON.parse(raw):null;
  }catch(e){return null;}
}

// Format catalog counselors array as a multi-line text block
function catalogCounselorsText(){
  const info=getCatalogInfo();
  if(!info || !Array.isArray(info.counselors) || !info.counselors.length) return '';
  return info.counselors.map(c=>{
    const parts=[];
    if(c.name) parts.push(c.name);
    if(c.caseload) parts.push(c.caseload);
    if(c.phone) parts.push(c.phone);
    if(c.email) parts.push(c.email);
    return parts.join(' — ');
  }).join('\n');
}

// True if a value is effectively empty (undefined, null, or whitespace-only string)
function isBlank(v){
  if(v==null) return true;
  if(typeof v==='string') return !v.trim();
  if(Array.isArray(v)) return !v.length || v.every(r=>Array.isArray(r)?r.every(c=>!c||!String(c).trim()):!r||!String(r).trim());
  return false;
}

function sdVal(key,fallback){
  const sd=getSD();
  if(!isBlank(sd[key])) return sd[key];
  // Fall back to catalog info for known overlapping fields
  if(key==='supportCounselors'){
    const text=catalogCounselorsText();
    if(text) return text;
  }
  return fallback;
}

// Build grad requirements table rows — prefers hub data, falls back to catalog's structured gradReqs
function gradRows(){
  const sd=getSD();
  let rawRows=sd.gradRequirements||[];
  let cols=sd.gradColumns||['Subject Area','Credits Required'];
  // If hub has nothing filled in, fall back to the catalog importer's grad reqs table
  if(isBlank(rawRows)){
    const info=getCatalogInfo();
    if(info && Array.isArray(info.gradReqs) && info.gradReqs.length){
      const _dn=(typeof SchoolConfig!=='undefined'&&SchoolConfig.load().shortName)||'District';
      cols=['Area','Subject',_dn+' Credits','UC/CSU Approved'];
      rawRows=info.gradReqs.map(r=>[
        (r.area && r.area!=='\u2014')?r.area.toUpperCase():'—',
        r.subject||'',
        r.juhsd||'',
        r.ucCsu||''
      ]);
    }
  }
  if(!rawRows.length) return '';
  // Normalize: support both old {subject,credits} objects and new array format
  const rows=rawRows.map(r=>Array.isArray(r)?r:[r.subject||'',r.credits||'']);
  const header=`<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const body=rows.map(r=>`<tr>${r.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('');
  return `<thead>${header}</thead><tbody>${body}</tbody>`;
}

// Rich-text values saved from the editor may contain HTML (from the rich-text
// toolbar). Older plain-text values just have \n line breaks. Render either
// faithfully — HTML inline; plain text wrapped in <p> with <br> for newlines.
function renderSD(v){
  const s=String(v||'');
  if(!s) return '';
  if(/<[a-zA-Z][^>]*>/.test(s)) return s; // already HTML from the rich editor
  // Legacy plain-text: escape then turn newlines into breaks
  const esc=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<p>${esc.replace(/\n/g,'<br>')}</p>`;
}

// Wrap school-data value in a content block, or show a placeholder callout
function sdBlock(key,placeholderHtml){
  const v=sdVal(key,'');
  if(!v) return `<div class="callout">📌 <strong>Not filled in yet.</strong> ${placeholderHtml}</div>`;
  return renderSD(v);
}

// ASCA domain chip labels
const DOMAIN_META={
  ac:{label:'Academic',cls:'ac'},
  cc:{label:'College / Career',cls:'cc'},
  se:{label:'Social / Emotional',cls:'se'}
};
function domainChips(domains){
  if(!domains||!domains.length) return '';
  return `<div class="domain-chips">${domains.map(d=>{
    const m=DOMAIN_META[d]; return m?`<span class="dchip ${m.cls}">${m.label}</span>`:'';
  }).join('')}</div>`;
}

// State
let S={lang:'en',sec:'start',open:new Set(['start-0'])};

function L(){return LANG[S.lang]}
function sec(id){
  const l=L();
  const s=l.sections[id]||LANG.en.sections[id];
  const fallback=!l.sections[id]&&S.lang!=='en';
  return {s,fallback};
}

function setLang(code){
  S.lang=code; S.open=new Set([S.sec+'-0']);
  const rtl=code==='ar';
  document.documentElement.setAttribute('dir',rtl?'rtl':'ltr');
  document.documentElement.setAttribute('lang',code);
  if(code==='ar'&&!document.getElementById('arfont')){
    const lk=document.createElement('link');
    lk.id='arfont';lk.rel='stylesheet';
    lk.href='https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap';
    document.head.appendChild(lk);
  }
  render();
}

function go(id){S.sec=id;S.open=new Set([id+'-0']);render();window.scrollTo(0,0);}

function toggle(key){
  S.open.has(key)?S.open.delete(key):S.open.add(key);
  renderMain();
}

function renderHdr(){
  const l=L();
  // Prefix the title with the configured school name (from SchoolConfig)
  let title=l.meta.title;
  if(window.SchoolConfig){
    const cfg=SchoolConfig.load();
    if(cfg.setupComplete && cfg.schoolName){
      title=cfg.schoolName+' '+title;
    }
  }
  document.getElementById('hdr').innerHTML=`
  <div class="hdr">
    <div class="hdr-left">
      <img data-school-logo class="hdr-logo" alt="" style="display:none">
      <div><div class="hdr-title">${title}</div><div class="hdr-tag">${l.meta.tag}</div></div>
    </div>
    <div class="lang-wrap">
      ${[['en','EN'],['es','ES'],['ar','عربي'],['fil','Filipino']].map(([c,lb])=>`<button class="lb${S.lang===c?' on':''}" onclick="setLang('${c}')">${lb}</button>`).join('')}
    </div>
  </div>`;
  if(window.SchoolConfig){SchoolConfig.applyIdentity();SchoolConfig.applyWatermark();}
}

function renderSide(){
  const l=L();
  document.getElementById('side').innerHTML=l.nav.map(n=>`
    <div class="ni${S.sec===n.id?' on':''}" onclick="go('${n.id}')">
      <span class="ni-icon">${n.icon}</span><span>${n.label}</span>
    </div>`).join('');
  document.getElementById('tabs').innerHTML=l.nav.map(n=>`
    <div class="ti${S.sec===n.id?' on':''}" onclick="go('${n.id}')">
      <span class="ti-icon">${n.icon}</span><span>${n.label}</span>
    </div>`).join('');
}

function renderMain(){
  const {s,fallback}=sec(S.sec);
  const l=L();
  let html='';
  if(fallback&&l.meta.notice) html+=`<div class="t-note">🌐 ${l.meta.notice}</div>`;
  html+=`<div class="sec-title">${s.title}</div><div class="sec-desc">${s.desc}</div>${domainChips(s.domains)}<div class="acc">`;
  s.items.forEach((item,i)=>{
    const key=`${S.sec}-${i}`;
    const open=S.open.has(key);
    html+=`<div class="ai${open?' open':''}">
      <button class="at" onclick="toggle('${key}')"><span>${item.q}</span><span class="arr">▾</span></button>
      <div class="ab">${item.a}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderFoot(){
  document.getElementById('foot').innerHTML=`<div class="foot">💬 ${L().meta.footer}</div>`;
}

function render(){renderHdr();renderSide();renderMain();renderFoot();}

render();
</script>
